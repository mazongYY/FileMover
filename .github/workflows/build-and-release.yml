name: Build and Release

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Test Code Quality
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'
        
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~\AppData\Local\pip\Cache
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 black mypy
        
    - name: Lint with flake8
      run: |
        # 停止构建如果有Python语法错误或未定义的名称
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # 退出零处理所有错误作为警告。GitHub编辑器宽度为127个字符
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        
    - name: Check code formatting with black
      run: |
        black --check --diff .
        
    - name: Type check with mypy
      run: |
        mypy main.py utils.py config_manager.py --ignore-missing-imports
        
    - name: Test imports
      run: |
        python -c "
        import main
        import utils
        import config_manager
        import advanced_gui
        import undo_manager
        import password_manager
        print('所有模块导入成功')
        "

  build:
    name: Build Windows Executable
    runs-on: windows-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'
        
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~\AppData\Local\pip\Cache
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Create application icon
      run: |
        python -c "
        from PIL import Image
        img = Image.new('RGB', (256, 256), (52, 152, 219))
        img.save('app_icon.ico')
        print('图标创建成功')
        "
        
    - name: Build with PyInstaller
      run: |
        python build_fixed.py
        
    - name: Test executable
      run: |
        if (Test-Path "dist\文件筛选与移动工具.exe") {
          $size = (Get-Item "dist\文件筛选与移动工具.exe").Length / 1MB
          Write-Host "可执行文件大小: $([math]::Round($size, 1)) MB"
          Write-Host "构建成功"
        } else {
          Write-Host "构建失败：找不到可执行文件"
          exit 1
        }
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: windows-executable
        path: |
          dist/文件筛选与移动工具.exe
          portable_release/
        retention-days: 30
        
    - name: Create release package
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        python create_release.py
        
    - name: Upload release artifacts
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-artifact@v3
      with:
        name: release-package
        path: release/
        retention-days: 90

  release:
    name: Create GitHub Release
    runs-on: windows-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download release artifacts
      uses: actions/download-artifact@v3
      with:
        name: release-package
        path: release/
        
    - name: Download executable
      uses: actions/download-artifact@v3
      with:
        name: windows-executable
        path: dist/
        
    - name: Get tag name
      id: tag
      run: |
        $tag = $env:GITHUB_REF -replace 'refs/tags/', ''
        echo "tag=$tag" >> $env:GITHUB_OUTPUT
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.tag.outputs.tag }}
        name: Windows文件筛选与移动工具 ${{ steps.tag.outputs.tag }}
        body: |
          ## 🎉 新版本发布
          
          ### 📦 下载
          - **完整版**: `Windows文件筛选与移动工具_${{ steps.tag.outputs.tag }}_*.zip` (包含文档)
          - **单文件版**: `文件筛选与移动工具.exe` (仅可执行文件)
          
          ### 🚀 快速开始
          1. 下载并解压完整版，或直接下载单文件版
          2. 双击运行 `文件筛选与移动工具.exe`
          3. 选择压缩包文件，输入关键字，开始处理
          
          ### 💻 系统要求
          - Windows 7/8/10/11 (64位)
          - 最少 512MB RAM
          - 最少 100MB 磁盘空间
          
          ### 📋 更新内容
          请查看 [CHANGELOG.md](./CHANGELOG.md) 了解详细更新内容。
          
          ---
          
          如有问题请提交 [Issue](https://github.com/${{ github.repository }}/issues)
        files: |
          dist/文件筛选与移动工具.exe
          release/*.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
